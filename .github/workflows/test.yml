name: test

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - name: Build we compiler
        run: cargo build
      - name: Compile tests/*.we programs
        run: |
          for f in tests/*.we; do
            echo "Compiling $f ..."
            ./target/debug/we "$f"
          done
